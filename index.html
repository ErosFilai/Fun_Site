<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Family News</title>
    <style>
      :root {
        --bg-start: #fff7f0;
        --bg-end: #fffdf9;
        --card: #ffffff;
        --text: #5a3e36;
        --accent: #f7b7a3;
        --shadow: rgba(172, 120, 103, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background: linear-gradient(160deg, var(--bg-start), var(--bg-end));
        color: var(--text);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .card {
        width: min(92vw, 560px);
        background: var(--card);
        border-radius: 1.25rem;
        box-shadow: 0 12px 30px var(--shadow);
        padding: clamp(1.25rem, 4vw, 2.5rem);
        text-align: center;
        border: 1px solid #ffe7de;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 700ms ease forwards;
      }

      h1 {
        margin: 0 0 0.65rem;
        font-size: clamp(1.5rem, 5vw, 2.2rem);
        line-height: 1.2;
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 3.7vw, 1.2rem);
        line-height: 1.55;
      }

      .sparkle {
        display: inline-block;
        margin-top: 1.1rem;
        font-size: 1.35rem;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <h1 id="title">✨ Big Family News</h1>
      <p id="message">We have exciting news to share with you!</p>
      <div class="sparkle" aria-hidden="true">💛 👶 🍼 🎉</div>
    </main>

    <script>
      const announcements = {
        aunt: {
          title: "Hi Auntie 💛",
          message:
            "We have a little surprise for you... you're going to be an aunt!",
        },
        uncle: {
          title: "Hey Uncle 🎉",
          message: "Big news — you're getting promoted to uncle!",
        },
        grandma: {
          title: "Dear Grandma 👶",
          message:
            "A tiny new family member is on the way. You’re going to be a grandma!",
        },
        grandpa: {
          title: "Dear Grandpa 🍼",
          message:
            "Get ready for cuddles and stories — you’re going to be a grandpa!",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const who = (params.get("who") || "").trim().toLowerCase();

      if (announcements[who]) {
        document.getElementById("title").textContent = announcements[who].title;
        document.getElementById("message").textContent = announcements[who].message;
      }
    </script>
  </body>
</html>
